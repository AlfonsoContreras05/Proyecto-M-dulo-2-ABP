<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alke Wallet | Enviar dinero</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="app-body">
  <nav class="navbar navbar-expand-lg app-navbar sticky-top" aria-label="Navegación principal">
    <div class="container">
      <a class="navbar-brand brand" href="menu.html">
        <span class="brand-logo" aria-hidden="true">A</span>
        <span><strong>Alke Wallet</strong><small>Transferencias</small></span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Abrir menú">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="menu.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="deposit.html">Depósito / Retiro</a></li>
          <li class="nav-item"><a class="nav-link active" href="sendmoney.html">Enviar dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html">Movimientos</a></li>
          <li class="nav-item ms-lg-3"><button class="btn btn-outline-light btn-sm" data-action="logout">Salir</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4 py-lg-5">
    <section class="page-header mb-4">
      <div>
        <p class="eyebrow">Envío de fondos</p>
        <h1>Enviar dinero</h1>
        <p>Busca un contacto, ingresa un monto y registra una transferencia simulada.</p>
      </div>
      <div class="mini-balance">
        <span>Saldo disponible</span>
        <strong class="js-balance">$0</strong>
      </div>
    </section>

    <section class="row g-4">
      <div class="col-lg-7">
        <div class="panel">
          <h2 class="section-title">Nueva transferencia</h2>
          <div id="sendMessage" class="alert d-none" role="alert"></div>

          <form id="sendMoneyForm" novalidate>
            <div class="mb-3 position-relative">
              <label for="contactSearch" class="form-label">Buscar contacto</label>
              <input type="text" class="form-control form-control-lg" id="contactSearch" placeholder="Ej: Camila, Diego, Valentina" autocomplete="off" required>
              <input type="hidden" id="selectedContactId">
              <div id="contactSuggestions" class="suggestions d-none" role="listbox"></div>
              <div class="form-text">El autocompletado está hecho con jQuery.</div>
            </div>

            <div class="mb-3">
              <label for="transferAmount" class="form-label">Monto a enviar</label>
              <input type="text" class="form-control form-control-lg" id="transferAmount" inputmode="numeric" placeholder="Ej: 12000" required>
            </div>

            <div class="mb-3">
              <label for="transferNote" class="form-label">Comentario opcional</label>
              <input type="text" class="form-control" id="transferNote" maxlength="60" placeholder="Ej: pago almuerzo">
            </div>

            <button class="btn btn-primary btn-lg" type="submit">Enviar dinero</button>
          </form>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="panel mb-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="section-title mb-0">Contactos</h2>
            <button class="btn btn-sm btn-outline-primary" type="button" data-bs-toggle="collapse" data-bs-target="#newContactCollapse" aria-expanded="false" aria-controls="newContactCollapse">Agregar</button>
          </div>

          <div class="collapse" id="newContactCollapse">
            <form id="contactForm" class="contact-form" novalidate>
              <input class="form-control mb-2" id="contactName" placeholder="Nombre" required>
              <input class="form-control mb-2" id="contactAccount" placeholder="Cuenta o alias" required>
              <input class="form-control mb-2" id="contactEmail" type="email" placeholder="correo@ejemplo.cl" required>
              <button class="btn btn-dark w-100" type="submit">Guardar contacto</button>
            </form>
            <hr>
          </div>

          <div id="contactsList" class="contacts-list"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
